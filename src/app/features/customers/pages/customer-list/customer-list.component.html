<app-page-header
  title="Customers"
  subtitle="Manage registered users"
/>

<p-table
  [value]="store.items()"
  [lazy]="true"
  [paginator]="true"
  [rows]="pageSize"
  [totalRecords]="store.totalCount()"
  [loading]="store.loading()"
  [rowsPerPageOptions]="[10, 20, 50]"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} customers"
  (onLazyLoad)="onLazyLoad($event)"
  dataKey="id"
  styleClass="p-datatable-sm p-datatable-striped"
>
  <ng-template #caption>
    <div class="table-header">
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText type="text" placeholder="Search customers..." (input)="onSearch($event)" />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header>
    <tr>
      <th pSortableColumn="firstName">Name <p-sortIcon field="firstName" /></th>
      <th pSortableColumn="email">Email <p-sortIcon field="email" /></th>
      <th>Username</th>
      <th>Country</th>
      <th>Status</th>
      <th style="width: 5rem">Actions</th>
    </tr>
  </ng-template>

  <ng-template #body let-user>
    <tr>
      <td>{{ user.firstName }} {{ user.lastName }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.username }}</td>
      <td>{{ user.country || '--' }}</td>
      <td>
        <p-tag
          [value]="user.isActive ? 'Active' : 'Inactive'"
          [severity]="user.isActive ? 'success' : 'danger'"
          [rounded]="true"
        />
      </td>
      <td>
        <p-button
          icon="pi pi-eye"
          [text]="true"
          [rounded]="true"
          severity="info"
          (onClick)="onView(user.id)"
        />
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="6">
        <app-empty-state title="No customers found" icon="fa-users" />
      </td>
    </tr>
  </ng-template>
</p-table>
