<app-page-header
  title="Movements"
  subtitle="Manage fitness movements"
>
  <p-button
    label="New Movement"
    icon="pi pi-plus"
    (onClick)="onCreate()"
  />
</app-page-header>

<p-table
  [value]="store.items()"
  [lazy]="true"
  [paginator]="true"
  [scrollable]="true"
  scrollHeight="flex"
  [rows]="pageSize"
  [totalRecords]="store.totalCount()"
  [loading]="store.loading()"
  [rowsPerPageOptions]="[10, 20, 50]"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} movements"
  (onLazyLoad)="onLazyLoad($event)"
  [globalFilterFields]="['name', 'status']"
  dataKey="id"
  styleClass="p-datatable-sm p-datatable-striped"
>
  <ng-template #caption>
    <div class="table-header">
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          placeholder="Search movements..."
          (input)="onSearch($event)"
        />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header>
    <tr>
      <th style="width: 3rem"></th>
      <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
      <th pSortableColumn="status">Status <p-sortIcon field="status" /></th>
      <th>Contributor</th>
      <th pSortableColumn="totalUsers">Users <p-sortIcon field="totalUsers" /></th>
      <th pSortableColumn="workoutSessions">Sessions <p-sortIcon field="workoutSessions" /></th>
      <th style="width: 8rem">Actions</th>
    </tr>
  </ng-template>

  <ng-template #body let-movement>
    <tr>
      <td>
        @if (movement.thumbnailUrl) {
          <img
            [src]="movement.thumbnailUrl"
            [alt]="movement.name"
            class="movement-thumbnail"
          />
        } @else {
          <div class="movement-thumbnail movement-thumbnail-placeholder">
            <i class="pi pi-image"></i>
          </div>
        }
      </td>
      <td>{{ movement.name }}</td>
      <td><app-status-badge [status]="movement.status" /></td>
      <td>{{ movement.contributorCompany || movement.contributorUser || '--' }}</td>
      <td>{{ movement.totalUsers }}</td>
      <td>{{ movement.workoutSessions }}</td>
      <td>
        <div class="action-buttons">
          <p-button
            icon="pi pi-pencil"
            [text]="true"
            [rounded]="true"
            severity="info"
            (onClick)="onEdit(movement.id)"
          />
          <p-button
            icon="pi pi-trash"
            [text]="true"
            [rounded]="true"
            severity="danger"
            (onClick)="onDelete(movement.id, movement.name)"
          />
        </div>
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="7">
        <app-empty-state
          title="No movements found"
          message="Create your first movement to get started."
          icon="fa-person-running-fast"
        >
          <p-button
            label="Create Movement"
            icon="pi pi-plus"
            [outlined]="true"
            (onClick)="onCreate()"
            styleClass="mt-3"
          />
        </app-empty-state>
      </td>
    </tr>
  </ng-template>
</p-table>

<p-confirmDialog />
